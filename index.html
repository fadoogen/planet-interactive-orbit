<title>Planet Labs — Orbital Constellation Viewer</title>
<style>

  body{background:#0a0a0f;color:#e0e0e8;font-family:'DM Sans',sans-serif;overflow:hidden;height:100vh;width:100vw;}
  canvas{display:block;}
  #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s;}
  #loading.done{opacity:0;pointer-events:none;}
  #loading h1{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#9ca3af;margin-bottom:12px;}
  #loading .bar{width:200px;height:2px;background:#1f1f2e;border-radius:2px;overflow:hidden;}
  #loading .bar-fill{height:100%;background:#6366f1;width:0%;transition:width 0.3s;}
  #ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
  #header{position:absolute;top:28px;left:44px;pointer-events:auto;}

  #sdp-accent{height:1px;margin-bottom:20px;opacity:0.3;}

<script>
// ═══════════════════════════════════════════════════════════════
//  LOAD NATURAL EARTH 50m LAND TOPOJSON → DRAW TO CANVAS TEXTURE
// ═══════════════════════════════════════════════════════════════
const loadBar = document.getElementById('load-bar');
const loadingEl = document.getElementById('loading');

async function generateEarthTexture() {
  loadBar.style.width = '10%';
  const W = 2048, H = 1024;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // Ocean gradient
  const og = ctx.createLinearGradient(0, 0, 0, H);
  og.addColorStop(0, '#0e1e40'); og.addColorStop(0.1, '#0c1c3a');
  og.addColorStop(0.3, '#091630'); og.addColorStop(0.5, '#071228');
  og.addColorStop(0.7, '#091630'); og.addColorStop(0.9, '#0c1c3a');
  og.addColorStop(1, '#0e1e40');
  ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);

  // Subtle ocean noise
  const id = ctx.getImageData(0, 0, W, H), d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = ((Math.sin(i * 0.0003) * 0.5 + Math.sin(i * 0.00017) * 0.3) * 4) | 0;
    d[i] += n; d[i+1] += n; d[i+2] += n + 2;
  }
  ctx.putImageData(id, 0, 0);

  loadBar.style.width = '20%';

  // Lon/lat → pixel
  function ll(lon, lat) { return [(lon + 180) / 360 * W, (90 - lat) / 180 * H]; }

  // Try to load real TopoJSON land data
  let geojsonLand = null;
  try {
    const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-50m.json');
    const topo = await resp.json();
    geojsonLand = topojson.feature(topo, topo.objects.land);
    loadBar.style.width = '60%';
  } catch (e) {
    console.warn('Could not load TopoJSON, trying 110m fallback...');
    try {
      const resp2 = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json');
      const topo2 = await resp2.json();
      geojsonLand = topojson.feature(topo2, topo2.objects.land);
    } catch (e2) {
      console.warn('Could not load any land data, using basic fallback');
    }
    loadBar.style.width = '60%';
  }

  if (geojsonLand) {
    // Draw all land polygons from real GeoJSON data
    const features = geojsonLand.type === 'FeatureCollection' ? geojsonLand.features : [geojsonLand];

    for (const feature of features) {
      const geom = feature.geometry || feature;
      let polygons = [];
      if (geom.type === 'Polygon') polygons = [geom.coordinates];
      else if (geom.type === 'MultiPolygon') polygons = geom.coordinates;

      for (const poly of polygons) {
        for (const ring of poly) {
          ctx.beginPath();
          const [sx, sy] = ll(ring[0][0], ring[0][1]);
          ctx.moveTo(sx, sy);
          for (let i = 1; i < ring.length; i++) {
            const [x, y] = ll(ring[i][0], ring[i][1]);
            ctx.lineTo(x, y);
          }
          ctx.closePath();

          // Biome coloring based on latitude of centroid
          let avgLat = 0;
          for (const pt of ring) avgLat += pt[1];
          avgLat /= ring.length;
          const absLat = Math.abs(avgLat);

          let color;
          if (absLat > 70) color = '#c0ccd8'; // ice
          else if (absLat > 58) color = '#252e22'; // tundra/boreal
          else if (absLat > 40) color = '#1e3a1e'; // temperate
          else if (absLat > 25) {
            // Check for desert regions (roughly North Africa, Arabia, Central Asia, Australia)
            let avgLon = 0;
            for (const pt of ring) avgLon += pt[0];
            avgLon /= ring.length;
            if ((avgLon > -20 && avgLon < 60 && avgLat > 15 && avgLat < 35) ||
                (avgLon > 100 && avgLon < 155 && avgLat < -15)) {
              color = '#3a3520'; // desert/arid
            } else {
              color = '#1e3a1e'; // temperate
            }
          }
          else if (absLat > 10) color = '#1a4418'; // subtropical
          else color = '#174a17'; // tropical

          ctx.fillStyle = color;
          ctx.fill();
        }
      }
    }
  }

  loadBar.style.width = '65%';

  // Coastal shelf glow
  if (geojsonLand) {
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = '#1a3850';
    const features = geojsonLand.type === 'FeatureCollection' ? geojsonLand.features : [geojsonLand];
    for (let pass = 0; pass < 3; pass++) {
      ctx.lineWidth = 3 + pass * 3;
      ctx.globalAlpha = 0.02 - pass * 0.005;
      for (const feature of features) {
        const geom = feature.geometry || feature;
        let polygons = [];
        if (geom.type === 'Polygon') polygons = [geom.coordinates];
        else if (geom.type === 'MultiPolygon') polygons = geom.coordinates;
        for (const poly of polygons) {
          const ring = poly[0];
          if (ring.length < 10) continue; // skip tiny islands for perf
          ctx.beginPath();
          const [sx, sy] = ll(ring[0][0], ring[0][1]);
          ctx.moveTo(sx, sy);
          for (let i = 1; i < ring.length; i++) {
            const [x, y] = ll(ring[i][0], ring[i][1]);
            ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.stroke();
        }
      }
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }

  loadBar.style.width = '70%';
  return new THREE.CanvasTexture(cv);
}

// ═══════════════════════════════════════════════════════════════
const CONSTELLATIONS = [
  {
    name:'SuperDove', color:'#22d3ee', altitude:500, count:200, inclination:97.4, planes:8,

    ]
  },
  {
    name:'Tanager', color:'#34d399', altitude:522, count:2, inclination:97.6, planes:1,
    description:'Hyperspectral, 400+ bands (400-2500nm). Methane & CO₂ detection via JPL spectrometer.',
    size:'SmallSat platform', resolution:'30m, 420 spectral bands', shape:'tanager',
    image:'references/inputs/Tanager.png', video:null,
    fullDesc:"Hyperspectral science satellite developed in partnership with NASA JPL. Carries a shortwave-infrared spectrometer spanning 400–2500 nm across 420+ spectral bands — enabling precise methane leak detection, CO₂ monitoring, and global greenhouse gas tracking directly from orbit.",
    specs:[
      {label:'Platform', value:'SmallSat'},
      {label:'Spectral Range', value:'400–2500 nm'},
      {label:'Bands', value:'420+ spectral'},
      {label:'Resolution', value:'~30 m GSD'},
      {label:'Mission', value:'Methane / CO₂'},
      {label:'Orbit', value:'522 km SSO'},
      {label:'Partner', value:'NASA JPL'},
      {label:'Fleet', value:'Tanager-1 & 2'},
    ]
  }
];

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000);
const sunLight=new THREE.DirectionalLight(0xfff5e0,1.8);sunLight.position.set(5,3,4);scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x223355,0.3));
(()=>{const l=new THREE.DirectionalLight(0x4488ff,0.2);l.position.set(-3,1,-4);scene.add(l);})();

const ER=5;

// Build earth asynchronously then add to scene
async function init() {
  const loader = new THREE.TextureLoader();
  function mkFallback(rgba){const dt=new THREE.DataTexture(new Uint8Array(rgba),1,1,THREE.RGBAFormat);dt.needsUpdate=true;return dt;}
  const safeTex=(url,rgba)=>new Promise(resolve=>{loader.load(url,resolve,undefined,()=>resolve(mkFallback(rgba)));});
  const BASE='https://threejs.org/examples/textures/planets/';

  // Primary: 8K Solar System Scope. Fallback: 2K Three.js CDN, then procedural TopoJSON.
  loadBar.style.width='15%';
  let earthTex;
  try {
    earthTex=await new Promise((resolve,reject)=>loader.load('references/inputs/8k_earth_daymap.jpg',resolve,undefined,reject));
    loadBar.style.width='60%';
  } catch(e) {
    try {
      earthTex=await new Promise((resolve,reject)=>loader.load(BASE+'earth_atmos_2048.jpg',resolve,undefined,reject));
      loadBar.style.width='60%';
    } catch(e2) {
      earthTex=await generateEarthTexture();
    }
  }

  // Specular map (2K CDN) + city night lights (8K local, fallback 2K CDN)
  loadBar.style.width='75%';
  const [specMap,nightMap]=await Promise.all([
    safeTex(BASE+'earth_specular_2048.jpg',[0,0,0,255]),
    new Promise(resolve=>loader.load('references/inputs/8k_earth_nightmap.jpg',resolve,undefined,
      ()=>loader.load(BASE+'earth_lights_2048.png',resolve,undefined,()=>resolve(mkFallback([0,0,0,255]))))),
  ]);
  loadBar.style.width='100%';
  setTimeout(()=>loadingEl.classList.add('done'),300);

  const earthMat=new THREE.ShaderMaterial({
    uniforms:{
      uTex:{value:earthTex},uSpecMap:{value:specMap},
      uNightTex:{value:nightMap},uLightDir:{value:new THREE.Vector3(1,0.2,0).normalize()}
    },
    vertexShader:`varying vec3 vNw;varying vec3 vN;varying vec3 vP;varying vec3 vPw;varying vec2 vUv;
      void main(){
        vNw=normalize(mat3(modelMatrix)*normal);
        vN=normalize(normalMatrix*normal);
        vP=(modelViewMatrix*vec4(position,1.0)).xyz;
        vPw=(modelMatrix*vec4(position,1.0)).xyz;
        vUv=uv;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
      }`,
    fragmentShader:`uniform sampler2D uTex;uniform sampler2D uSpecMap;uniform sampler2D uNightTex;uniform vec3 uLightDir;
      varying vec3 vNw;varying vec3 vN;varying vec3 vP;varying vec3 vPw;varying vec2 vUv;
      void main(){
        vec3 tc=texture2D(uTex,vUv).rgb;
        float rawDiff=dot(vNw,uLightDir);
        float diff=max(rawDiff,0.0);
        vec3 lit=tc*(0.02+pow(diff,0.9)*0.98);
        float specMask=texture2D(uSpecMap,vUv).r;
        vec3 viewDirW=normalize(cameraPosition-vPw);
        vec3 hd=normalize(uLightDir+viewDirW);
        float spec=pow(max(dot(vNw,hd),0.0),60.0)*specMask*diff;
        lit+=vec3(spec*0.5,spec*0.7,spec);
        vec3 nightTex=texture2D(uNightTex,vUv).rgb;
        vec3 nightLights=nightTex*nightTex*7.0;
        float nightFactor=1.0-smoothstep(-0.08,0.0,rawDiff);
        lit+=nightLights*nightFactor;
        vec3 vd=normalize(-vP);
        float rim=1.0-max(dot(vd,vN),0.0);rim=pow(rim,3.0);
        lit+=vec3(0.15,0.35,0.9)*rim*0.6;
        gl_FragColor=vec4(lit,1.0);
      }`
  });
  // Earth group — tilted 23.5° on Z axis (axial tilt), never rotates
  const TILT=23.5*Math.PI/180;
  const earthGroup=new THREE.Group();
  earthGroup.rotation.z=TILT;
  scene.add(earthGroup);

  // Spin group inside earthGroup — rotates around local Y (the tilted axis)
  earthSpinGroup=new THREE.Group();
  earthGroup.add(earthSpinGroup);

  // Earth mesh and equator ring spin with the planet
  earthSpinGroup.add(new THREE.Mesh(new THREE.SphereGeometry(ER,128,128),earthMat));
  const eqPts=[];for(let i=0;i<=128;i++){const a=i/128*Math.PI*2;eqPts.push(new THREE.Vector3(Math.cos(a)*ER*1.01,0,Math.sin(a)*ER*1.01));}

  earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(ER*1.015,64,64),new THREE.ShaderMaterial({
    vertexShader:`varying vec3 vN;varying vec3 vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN;varying vec3 vP;void main(){float rim=1.0-max(dot(normalize(-vP),vN),0.0);rim=pow(rim,4.0);gl_FragColor=vec4(vec3(0.2,0.45,1.0)*rim,rim*0.5);}`,
    transparent:true,side:THREE.FrontSide,depthWrite:false})));

  // Axis line — fixed through the poles, does not spin
  const axisLen=ER*1.45;
  const axisGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-axisLen,0),new THREE.Vector3(0,axisLen,0)]);
  earthGroup.add(new THREE.Line(axisGeo,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.35})));

  // Vertical reference line (world Y axis — "straight up" guide)
  const vertLen=ER*1.45;
  const vertGeo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-vertLen,0),new THREE.Vector3(0,vertLen,0)]);
  scene.add(new THREE.Line(vertGeo,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.18})));

  // Tilt angle arc — from world vertical (0,arcR,0) to tilted-axis direction (-sin(TILT),cos(TILT),0)*arcR
  const arcPts=[];const arcR=ER*1.35;const arcSegs=32;
  for(let i=0;i<=arcSegs;i++){const a=-i/arcSegs*TILT;arcPts.push(new THREE.Vector3(Math.sin(a)*arcR,Math.cos(a)*arcR,0));}
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(arcPts),new THREE.LineBasicMaterial({color:0xffee88,transparent:true,opacity:0.7})));

  // Anchor the "23.5°" label at the arc midpoint, offset outward
  const arcMid=-TILT/2;
  tiltLabelPos.set(Math.sin(arcMid)*arcR*1.12,Math.cos(arcMid)*arcR*1.12,0);

  // Load Owl OBJ model
  await new Promise(resolve=>{
    new THREE.OBJLoader().load(
      'references/inputs/OwlProxy_forWeb.obj?t='+Date.now(),
      obj=>{
        // Rotate so solar panels extend cross-track (±X) instead of fore-aft
        obj.rotation.y=-Math.PI/2;
        obj.scale.setScalar(0.00075);

        // Body (RS Standard.7) + topside surfaces (default) → silver
        // Solar panel arrays (RS Standard) → blue
        const matBody=new THREE.MeshPhongMaterial({color:0xb89000,specular:0xeedd44,shininess:70,emissive:0x221a00});
        const matPanel=new THREE.MeshPhongMaterial({color:0x1a4488,emissive:0x0a1e3a,specular:0x4477cc,shininess:25});
        let owlMeshIdx=0;
        obj.traverse(ch=>{
          if(!ch.isMesh)return;
          ch.material=(ch.material.name==='RS Standard'||owlMeshIdx++>0)?matPanel:matBody;
        });
        if(groups['Owl']){

  // Load SkySat OBJ model
  await new Promise(resolve=>{
    new THREE.OBJLoader().load(
      'references/inputs/SkySat_forWeb.obj?t='+Date.now(),
      obj=>{

  // Load DoveProxy OBJ model — replaces instanced SuperDove CubeSat geometry
  await new Promise(resolve=>{

      'references/inputs/DoveProxy_forWeb.obj?t='+Date.now(),
      obj=>{
        let rawGeo=null;

        if(rawGeo&&groups['SuperDove']){

          rawGeo.computeBoundingBox();
          const bc=new THREE.Vector3();
          rawGeo.boundingBox.getCenter(bc);

          const sc=0.0005;

          // CubeSat body box lives at old X centered = +0.010 → +0.045 (original X 24→62)
          // Solar panel platform is everything else (xc ≤ 0.009)

          const nrmArr=rawGeo.attributes.normal.array;
          const nVerts=rawGeo.attributes.position.count;
          const bPos=[],bNrm=[],wPos=[],wNrm=[];

            const b=f*3;
            const xc=(posArr[b]+posArr[b+3]+posArr[b+6])/3;
            const isWing=(xc<=0.009);
            const pa=isWing?wPos:bPos, na=isWing?wNrm:bNrm;

          const bodyMesh=new THREE.InstancedMesh(bodyGeo,new THREE.MeshPhongMaterial({color:0xc0c4cc,specular:0x999999,shininess:80,emissive:0x111111}),sd.count);
          const wingMesh=new THREE.InstancedMesh(wingGeo,new THREE.MeshPhongMaterial({color:0x1a4488,emissive:0x0a1e3a,specular:0x4477cc,shininess:25}),sd.count);
          bodyMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
          wingMesh.instanceMatrix=bodyMesh.instanceMatrix;
          sd.g.remove(sd.mesh);
          sd.g.add(bodyMesh);
          sd.g.add(wingMesh);
          sd.mesh=bodyMesh;
        }
        resolve();
      },
      undefined,
      err=>{console.error('Dove OBJ load failed:',err);resolve();}
    );
  });
}

function applyHighlight(sel){
  CONSTELLATIONS.forEach(c=>{
    const g=groups[c.name];
    const dim=sel!==null&&c.name!==sel;
    const boost=sel!==null&&c.name===sel;
    const hlColor=new THREE.Color(c.color);
    g.g.traverse(obj=>{
      if(!obj.material)return;
      if(obj.isLine){
        if(!orbitVis[c.name]){obj.visible=false;return;}
        obj.visible=true;
        obj.material.opacity=dim?0.02:boost?0.55:0.12;
      }else if(obj.isMesh){
        if(!obj.material._origEmissive){
          obj.material._origEmissive=obj.material.emissive.clone();
        }
        obj.material.transparent=dim;
        obj.material.opacity=dim?0.08:1.0;
        if(boost){
          obj.material.emissive.set(hlColor.clone().multiplyScalar(0.55));
        }else{
          obj.material.emissive.copy(obj.material._origEmissive);
        }
        obj.material.needsUpdate=true;
      }
    });
  });
}

function updateCarousel(){
  const step=300;
  const n=CONSTELLATIONS.length;
  carouselItems.forEach((item,i)=>{
    // Circular offset: shortest path around the loop
    let off=i-selectedIndex;
    if(off>n/2)off-=n;
    if(off<-n/2)off+=n;
    const absOff=Math.abs(off);
    let sc,op,zi;
    if(absOff===0){sc=1.0;op=1.0;zi=4;}
    else if(absOff===1){sc=0.48;op=0.45;zi=3;}
    else{sc=0.28;op=0.0;zi=2;}
    item.style.transform=`translateY(${off*step}px) scale(${sc})`;
    item.style.opacity=op;
    item.style.zIndex=zi;
  });
}

      `<button class="nav-toggle-btn orbit-btn" style="color:${c.color}88;border-color:${c.color}33">Orbit</button>`+
      `<button class="nav-toggle-btn vis-btn" style="color:${c.color}88;border-color:${c.color}33">ON</button>`+
    `</div>`;
  entry.addEventListener('click',e=>{
    if(e.target.classList.contains('orbit-btn')||e.target.classList.contains('vis-btn'))return;
    setSelected(i,true);
  });
  const orbitBtn=entry.querySelector('.orbit-btn');
  orbitBtn.addEventListener('click',e=>{
    e.stopPropagation();
    orbitVis[c.name]=!orbitVis[c.name];
    groups[c.name].g.traverse(obj=>{if(obj.isLine)obj.visible=orbitVis[c.name];});
    orbitBtn.classList.toggle('off-state',!orbitVis[c.name]);
  });
  const visBtn=entry.querySelector('.vis-btn');
  visBtn.addEventListener('click',e=>{
    e.stopPropagation();
    vis[c.name]=!vis[c.name];
    groups[c.name].g.visible=vis[c.name];
    visBtn.textContent=vis[c.name]?'ON':'OFF';
    visBtn.classList.toggle('off-state',!vis[c.name]);
    applyHighlight(CONSTELLATIONS[selectedIndex].name);
    ut();
  });
  navEntries[c.name]=entry;
  bottomNav.appendChild(entry);
});

function updateBottomNavState(){
  CONSTELLATIONS.forEach((c,i)=>{
    const entry=navEntries[c.name];
    const nameEl=entry.querySelector('.nav-sat-name');
    if(i===selectedIndex){
      nameEl.style.color=c.color;
      entry.classList.add('active');
    }else{
      nameEl.style.color='#6b7280';
      entry.classList.remove('active');
    }
  });
}

function setSelected(idx,doHighlight){
  selectedIndex=((idx%CONSTELLATIONS.length)+CONSTELLATIONS.length)%CONSTELLATIONS.length;
  const c=CONSTELLATIONS[selectedIndex];
  updateLeftPanel(c);
  updateCarousel();
  updateBottomNavState();
  if(doHighlight)applyHighlight(c.name);
}

// Drag state
let carDrag=false,carDragY=0,carDragAcc=0;
let ldDrag=false,ldDragY=0,ldDragAcc=0;

carouselEl.addEventListener('mousedown',e=>{carDrag=true;carDragY=e.clientY;carDragAcc=0;e.preventDefault();});
sdp.addEventListener('mousedown',e=>{ldDrag=true;ldDragY=e.clientY;ldDragAcc=0;e.preventDefault();});
// Scroll wheel on carousel and left panel
let wheelCooldown=false;
function onSatWheel(e){e.preventDefault();if(wheelCooldown)return;wheelCooldown=true;setTimeout(()=>{wheelCooldown=false;},280);setSelected(selectedIndex+(e.deltaY>0?1:-1),true);}
carouselEl.addEventListener('wheel',onSatWheel,{passive:false});
sdp.addEventListener('wheel',onSatWheel,{passive:false});
window.addEventListener('mousemove',e=>{
  if(carDrag){const dy=e.clientY-carDragY;carDragY=e.clientY;carDragAcc+=dy;if(Math.abs(carDragAcc)>=55){setSelected(selectedIndex+(carDragAcc<0?1:-1),true);carDragAcc=0;}}
  if(ldDrag){const dy=e.clientY-ldDragY;ldDragY=e.clientY;ldDragAcc+=dy;if(Math.abs(ldDragAcc)>=55){setSelected(selectedIndex+(ldDragAcc<0?1:-1),true);ldDragAcc=0;}}
});
window.addEventListener('mouseup',()=>{carDrag=false;ldDrag=false;});

// Init
setSelected(0,true);

function ut(){let t=0;CONSTELLATIONS.forEach(c=>{if(vis[c.name])t+=c.count;});const el=document.getElementById('sat-total');if(el)el.textContent=t;}
ut();
document.getElementById('speed-slider').addEventListener('input',function(){spd=parseFloat(this.value);document.getElementById('speed-val').textContent=spd.toFixed(1)+'×';});

let tiltLabelPos=new THREE.Vector3();
let earthSpinGroup;
let isDrag=false,pm={x:0,y:0},sp={theta:0,phi:Math.PI/3,radius:22};
function uc(){const r=sp.radius;camera.position.set(r*Math.sin(sp.phi)*Math.sin(sp.theta),r*Math.cos(sp.phi),r*Math.sin(sp.phi)*Math.cos(sp.theta));camera.lookAt(0,0,0);}uc();
canvas.addEventListener('pointerdown',e=>{isDrag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('pointermove',e=>{if(!isDrag)return;sp.theta-=(e.clientX-pm.x)*0.005;sp.phi=Math.max(0.2,Math.min(Math.PI-0.2,sp.phi+(e.clientY-pm.y)*0.005));pm={x:e.clientX,y:e.clientY};uc();});
window.addEventListener('pointerup',()=>isDrag=false);
canvas.addEventListener('wheel',e=>{e.preventDefault();sp.radius=Math.max(ER+0.2,Math.min(50,sp.radius+e.deltaY*0.015));uc();},{passive:false});

const tt=document.getElementById('tooltip'),rc=new THREE.Raycaster(),mv=new THREE.Vector2();
canvas.addEventListener('mousemove',e=>{mv.x=(e.clientX/window.innerWidth)*2-1;mv.y=-(e.clientY/window.innerHeight)*2+1;rc.setFromCamera(mv,camera);let hit=false;for(const c of CONSTELLATIONS){if(!vis[c.name])continue;const g=groups[c.name];let its;if(g.inst){its=rc.intersectObject(g.mesh);}else{const al=[];g.sats.forEach(s=>s.traverse(ch=>{if(ch.isMesh)al.push(ch);}));its=rc.intersectObjects(al);}if(its.length>0){let tx=e.clientX+16,ty=e.clientY-10;if(tx+260>window.innerWidth)tx=e.clientX-270;if(ty+200>window.innerHeight)ty=e.clientY-200;tt.style.display='block';tt.style.left=tx+'px';tt.style.top=ty+'px';tt.querySelector('.tt-name').textContent=c.name;tt.querySelector('.tt-name').style.color=c.color;tt.querySelector('.tt-detail').innerHTML=`${c.description}<br><br><span style="color:#6b7280">Altitude:</span> ${c.altitude} km<br><span style="color:#6b7280">Fleet:</span> ${c.count} sats<br><span style="color:#6b7280">Size:</span> ${c.size}<br><span style="color:#6b7280">Resolution:</span> ${c.resolution}`;hit=true;break;}}if(!hit)tt.style.display='none';});

const clock=new THREE.Clock();
function op(ph,t,pf,oR,iR,rn){const a=ph+t*pf*2;let x=oR*Math.cos(a),y=0,z=oR*Math.sin(a);const ny=y*Math.cos(iR)-z*Math.sin(iR),nz=y*Math.sin(iR)+z*Math.cos(iR);y=ny;z=nz;return{x:x*Math.cos(rn)-z*Math.sin(rn),y,z:x*Math.sin(rn)+z*Math.cos(rn)};}
function animate(){
  requestAnimationFrame(animate);const el=clock.getElapsedTime(),t=el*spd;
  stMat.uniforms.uTime.value=el;
  if(!isDrag){sp.theta+=0.0008*spd;uc();}
  if(earthSpinGroup)earthSpinGroup.rotation.y=-t*0.04;
  for(const c of CONSTELLATIONS){if(!vis[c.name])continue;const g=groups[c.name];
    if(g.inst){for(let i=0;i<g.count;i++){const rn=(g.pa[i]/g.planes)*Math.PI*2;const r=g.planeRs[g.pa[i]];const pf=0.08/(r/ER);const p=op(g.ph[i],t,pf,r,g.iR,rn);const a=op(g.ph[i]+0.02,t,pf,r,g.iR,rn);g.dm.position.set(p.x,p.y,p.z);const uv=new THREE.Vector3(p.x,p.y,p.z).normalize();g.dm.up.copy(uv);g.dm.lookAt(a.x,a.y,a.z);g.dm.updateMatrix();g.mesh.setMatrixAt(i,g.dm.matrix);}g.mesh.instanceMatrix.needsUpdate=true;}
    else{for(let i=0;i<g.count;i++){const rn=(g.pa[i]/g.planes)*Math.PI*2;const r=g.planeRs[g.pa[i]];const pf=0.08/(r/ER);const p=op(g.ph[i],t,pf,r,g.iR,rn);const a=op(g.ph[i]+0.02,t,pf,r,g.iR,rn);g.sats[i].position.set(p.x,p.y,p.z);g.sats[i].up.set(p.x,p.y,p.z).normalize();g.sats[i].lookAt(a.x,a.y,a.z);}}}
  renderer.render(scene,camera);
  // Project tilt label to screen space
  const tlp=tiltLabelPos.clone().project(camera);
  const tlEl=document.getElementById('tilt-label');
  tlEl.style.left=(( tlp.x*0.5+0.5)*window.innerWidth+6)+'px';
  tlEl.style.top=((-tlp.y*0.5+0.5)*window.innerHeight)+'px';
  tlEl.style.display=tlp.z<1?'block':'none';
}

// Start everything
init().then(() => animate());

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
